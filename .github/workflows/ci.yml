name: tests

# Runs the automated test suite on every push and pull request. Because the app
# auto-updates users from this repo, a green check here is the safety net before
# a release goes out.
on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        # The test suite doesn't drive the Playwright scraper, so we skip
        # Playwright (its pinned greenlet fails to build on newer Python) — this
        # keeps CI fast and green across versions while still exercising the code.
        run: |
          python -m pip install --upgrade pip
          grep -v '^playwright' requirements.txt > req-ci.txt
          pip install -r req-ci.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
